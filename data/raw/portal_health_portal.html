<div class="patient-portal">
  <header>
    <h1>MyHealth Dashboard</h1>
    <nav>
      <a href="/dashboard">Overview</a>
      <a href="/appointments">Appointments</a>
      <a href="/records">Medical Records</a>
    </nav>
  </header>
  <main>
    <section class="auth-box">
      <h2>Access Your Health Records</h2>
      <form action="/api/v1/auth" method="POST">
        <label>Health ID</label>
        <input type="text" name="health_id">
        <label>PIN</label>
        <input type="password" name="pin">
        <button type="submit">Unlock Records</button>
      </form>
    </section>
  </main>
</div>
