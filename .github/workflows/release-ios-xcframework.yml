name: Release iOS XCFramework

on:
  push:
    tags:
      - 'v*' # Trigger on version tags like v1.0.0

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: 'latest-stable'

      - name: Build XCFramework
        run: ./scripts/build_xcframework.sh

      - name: Read Checksum
        id: checksum
        run: echo "value=$(cat dist/ios/checksum.txt)" >> $GITHUB_OUTPUT

      - name: Create Release
        id: create_release
        uses: softprops/action-gh-release@v1
        with:
          files: dist/ios/AleteGateKit.xcframework.zip
          body: |
            ## AleteGateKit Release ${{ github.ref_name }}
            
            ### SPM Binary Target Configuration:
            ```swift
            .binaryTarget(
                name: "AleteGateKit",
                url: "https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/AleteGateKit.xcframework.zip",
                checksum: "${{ steps.checksum.outputs.value }}"
            )
            ```
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
